# These secrets must be set in the GitHub repository settings:
#
# DOCKERHUB_REPO - docker hub repo, format: <username>/<repo>
# DOCKER_USER    - login info for docker hub
# DOCKER_PASS

name: CI

on:
  push:
    # Ignore branches with slashes (e.g. dependabot/...)
    branches-ignore:
      - "**/**"
    tags:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run python tests
        run: |
          mkdir test-results
          pytest --junitxml=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create version.json
        run: |
          echo '{
            "commit": "${{ github.sha }}",
            "version": "${{ github.sha }}",
            "source": "https://github.com/mozilla-conduit/phabricator-emails",
            "build": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' > version.json

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_REPO != '' && env.DOCKER_USER != '' && env.DOCKER_PASS != '' }}
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}

      - name: Build the image
        run: |
          docker build --pull \
            -f Dockerfile \
            -t mozilla/phabricator-emails .

      - name: Get image ID
        run: |
          docker inspect -f '{{.Id}}' mozilla/phabricator-emails \
            | tee docker-image-id.txt
      - name: Upload image ID artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-id
          path: docker-image-id.txt

      - name: Push to Docker Hub
        if: ${{ env.DOCKERHUB_REPO != '' && env.DOCKER_USER != '' && env.DOCKER_PASS != '' }}
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
        run: |
          docker tag "mozilla/phabricator-emails" "${{ secrets.DOCKERHUB_REPO }}"
          docker tag "mozilla/phabricator-emails" "${{ secrets.DOCKERHUB_REPO }}:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_REPO }}:${{ github.sha }}"
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            docker push "${{ secrets.DOCKERHUB_REPO }}:latest"
          fi
